name: Build and publish container images

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main
    tags:
      - "v*.*.*"

  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build test image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: test
          load: true
          push: false
          tags: k8s-universal-test:ci
          cache-from: type=gha,scope=test
          cache-to: type=gha,mode=max,scope=test

      - name: Run pytest
        run: |
          docker run --rm             -e DATABASE_URL=sqlite:////tmp/cluster-builder-tests.db             -e MASTER_KEY=test-master-key-that-is-never-used-in-production             -e SESSION_SECRET=test-session-secret-that-is-never-used-in-production             -e INITIAL_ADMIN_PASSWORD=test-admin-password             -e DATA_ROOT=/tmp/cluster-builder-data             -e SOURCE_ROOT=/workspace             k8s-universal-test:ci

  build:
    name: Build ${{ matrix.target }} image
    needs:
      - test

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        target:
          - web
          - worker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/midniqhtvibes/k8s-universal-${{ matrix.target }}
          tags: |
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-

      - name: Build and optionally push image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
