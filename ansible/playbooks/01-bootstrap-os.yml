---
- name: Bootstrap operating system
  hosts: all
  become: true
  any_errors_fatal: true
  tasks:
    - name: Wait for cloud-init to finish
      ansible.builtin.command: timeout 1200 cloud-init status --wait --long
      register: cloud_init_status
      changed_when: false
      failed_when: false

    - name: Collect cloud-init output log on failure
      ansible.builtin.command:
        argv:
          - tail
          - -n
          - "160"
          - /var/log/cloud-init-output.log
      register: cloud_init_output_log
      changed_when: false
      failed_when: false
      when: >-
        cloud_init_status.rc not in [0, 2]
        or 'status: done' not in cloud_init_status.stdout
        or 'errors: []' not in cloud_init_status.stdout

    - name: Collect cloud-init debug log on failure
      ansible.builtin.command:
        argv:
          - tail
          - -n
          - "160"
          - /var/log/cloud-init.log
      register: cloud_init_debug_log
      changed_when: false
      failed_when: false
      when: >-
        cloud_init_status.rc not in [0, 2]
        or 'status: done' not in cloud_init_status.stdout
        or 'errors: []' not in cloud_init_status.stdout

    - name: Fail if cloud-init did not finish cleanly
      ansible.builtin.fail:
        msg: |
          cloud-init did not finish cleanly on {{ inventory_hostname }}.

          cloud-init rc:
          {{ cloud_init_status.rc }}

          cloud-init stdout:
          {{ cloud_init_status.stdout }}

          cloud-init stderr:
          {{ cloud_init_status.stderr }}

          /var/log/cloud-init-output.log:
          {{ cloud_init_output_log.stdout | default('not collected') }}

          /var/log/cloud-init.log:
          {{ cloud_init_debug_log.stdout | default('not collected') }}
      when: >-
        cloud_init_status.rc not in [0, 2]
        or 'status: done' not in cloud_init_status.stdout
        or 'errors: []' not in cloud_init_status.stdout

    - name: Wait for apt and dpkg locks to become available
      ansible.builtin.shell: |
        set -o pipefail
        timeout 600 bash -c '
          while lslocks --noheadings --output PATH 2>/dev/null \
            | grep -Eq "/var/lib/dpkg/lock(-frontend)?|/var/lib/apt/lists/lock|/var/cache/apt/archives/lock"; do
            sleep 5
          done
        '
      args:
        executable: /bin/bash
      changed_when: false

    - name: Complete interrupted package configuration
      ansible.builtin.command: dpkg --configure -a
      environment:
        DEBIAN_FRONTEND: noninteractive
      changed_when: false
      register: dpkg_configure
      until: dpkg_configure.rc == 0
      retries: 60
      delay: 10

    - name: Set hostname
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}"

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        lock_timeout: 600

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - curl
          - gnupg
          - ca-certificates
          - apt-transport-https
          - software-properties-common
          - chrony
          - net-tools
          - jq
          - socat
          - conntrack
          - ebtables
          - ethtool
          - ipvsadm
          - nfs-common
        state: present
        lock_timeout: 600

    - name: Disable swap immediately
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Disable swap in fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '# \1'

    - name: Load kernel modules config
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter

    - name: Load overlay module
      ansible.builtin.command: modprobe overlay
      changed_when: false

    - name: Load br_netfilter module
      ansible.builtin.command: modprobe br_netfilter
      changed_when: false

    - name: Configure sysctl for Kubernetes networking
      ansible.builtin.copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1

    - name: Apply sysctl
      ansible.builtin.command: sysctl --system
      changed_when: false
