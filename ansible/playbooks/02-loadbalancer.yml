---
- name: Configure HAProxy and Keepalived
  hosts: loadbalancer
  become: true
  any_errors_fatal: true

  tasks:
    - name: Install HAProxy and Keepalived
      ansible.builtin.apt:
        name:
          - haproxy
          - keepalived
        state: present
        update_cache: true
        lock_timeout: 600

    - name: Configure HAProxy
      ansible.builtin.copy:
        dest: /etc/haproxy/haproxy.cfg
        owner: root
        group: root
        mode: "0644"
        validate: /usr/sbin/haproxy -c -f %s
        content: |
          global
              log /dev/log local0
              log /dev/log local1 notice
              daemon
              maxconn 2048

          defaults
              log     global
              mode    tcp
              option  tcplog
              option  dontlognull
              timeout connect 5s
              timeout client  50s
              timeout server  50s

          frontend kubernetes_api
              bind *:{{ api_port }}
              mode tcp
              default_backend kubernetes_control_plane

          backend kubernetes_control_plane
              mode tcp
              balance roundrobin
              option tcp-check
          {% for backend in haproxy_backends %}
              server {{ backend.name }} {{ backend.ip }}:{{ api_port }} check
          {% endfor %}

          {% if ingress_enabled %}
          frontend http_ingress
              bind *:80
              mode tcp
              default_backend traefik_http

          backend traefik_http
              mode tcp
              balance roundrobin
              option tcp-check
          {% for backend in haproxy_workers %}
              server {{ backend.name }} {{ backend.ip }}:{{ ingress_http_node_port }} check
          {% endfor %}

          frontend https_ingress
              bind *:443
              mode tcp
              default_backend traefik_https

          backend traefik_https
              mode tcp
              balance roundrobin
              option tcp-check
          {% for backend in haproxy_workers %}
              server {{ backend.name }} {{ backend.ip }}:{{ ingress_https_node_port }} check
          {% endfor %}
          {% endif %}
      notify: Restart HAProxy

    - name: Set keepalived state
      ansible.builtin.set_fact:
        keepalived_state: "{{ 'MASTER' if inventory_hostname == keepalived_master else 'BACKUP' }}"

    - name: Set keepalived priority
      ansible.builtin.set_fact:
        # Keep enough distance from VRRP's reserved address-owner priority 255.
        # Adjacent values are intentional: the health-check weight of 2 must
        # be able to move a healthy backup above an unhealthy current master.
        keepalived_priority: "{{ 150 - groups['loadbalancer'].index(inventory_hostname) }}"

    - name: Configure Keepalived
      ansible.builtin.copy:
        dest: /etc/keepalived/keepalived.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          vrrp_script chk_haproxy {
              script "pidof haproxy"
              interval 2
              weight 2
          }

          vrrp_instance VI_1 {
              state {{ keepalived_state }}
              interface {{ keepalived_interface | default('eth0') }}
              virtual_router_id {{ keepalived_virtual_router_id }}
              priority {{ keepalived_priority }}
              advert_int 1

              authentication {
                  auth_type PASS
                  auth_pass {{ lookup('env', 'KEEPALIVED_AUTH_PASS') }}
              }

              virtual_ipaddress {
                  {{ api_vip }}/{{ api_prefix }}
              }

              track_script {
                  chk_haproxy
              }
          }
      notify: Restart Keepalived

    - name: Enable and start HAProxy
      ansible.builtin.service:
        name: haproxy
        enabled: true
        state: started

    - name: Enable and start Keepalived
      ansible.builtin.service:
        name: keepalived
        enabled: true
        state: started

  handlers:
    - name: Restart HAProxy
      ansible.builtin.service:
        name: haproxy
        state: restarted

    - name: Restart Keepalived
      ansible.builtin.service:
        name: keepalived
        state: restarted
