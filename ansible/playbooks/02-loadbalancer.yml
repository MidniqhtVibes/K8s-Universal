---
- name: Configure HAProxy and Keepalived
  hosts: loadbalancer
  become: true
  any_errors_fatal: true

  tasks:
    - name: Install HAProxy and Keepalived
      ansible.builtin.apt:
        name:
          - haproxy
          - keepalived
        state: present
        update_cache: true
        cache_valid_time: 3600
        lock_timeout: 600
        update_cache_retries: 5
        update_cache_retry_max_delay: 30

    - name: Configure HAProxy
      ansible.builtin.copy:
        dest: /etc/haproxy/haproxy.cfg
        owner: root
        group: root
        mode: "0644"
        validate: /usr/sbin/haproxy -c -f %s
        content: |
          global
              log /dev/log local0
              log /dev/log local1 notice
              daemon
              maxconn 2048

          defaults
              log     global
              mode    tcp
              option  tcplog
              option  dontlognull
              timeout connect 5s
              timeout client  50s
              timeout server  50s

          frontend kubernetes_api
              bind *:{{ api_port }}
              mode tcp
              default_backend kubernetes_control_plane

          backend kubernetes_control_plane
              mode tcp
              balance roundrobin
              option tcp-check
          {% for backend in haproxy_backends %}
              server {{ backend.name }} {{ backend.ip }}:{{ api_port }} check
          {% endfor %}

          frontend http_ingress
              bind *:80
              mode tcp
              default_backend traefik_http

          backend traefik_http
              mode tcp
              balance roundrobin
              option tcp-check
          {% for backend in haproxy_workers %}
              server {{ backend.name }} {{ backend.ip }}:{{ ingress_http_node_port }} check
          {% endfor %}

          frontend https_ingress
              bind *:443
              mode tcp
              default_backend traefik_https

          backend traefik_https
              mode tcp
              balance roundrobin
              option tcp-check
          {% for backend in haproxy_workers %}
              server {{ backend.name }} {{ backend.ip }}:{{ ingress_https_node_port }} check
          {% endfor %}
      notify: Restart HAProxy

    - name: Set keepalived state
      ansible.builtin.set_fact:
        keepalived_state: "{{ 'MASTER' if inventory_hostname == keepalived_master else 'BACKUP' }}"

    - name: Set keepalived priority
      ansible.builtin.set_fact:
        keepalived_priority: "{{ 110 - (groups['loadbalancer'].index(inventory_hostname) * 10) }}"

    - name: Configure Keepalived
      ansible.builtin.copy:
        dest: /etc/keepalived/keepalived.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          vrrp_script chk_haproxy {
              script "pidof haproxy"
              interval 2
              weight 2
          }

          vrrp_instance VI_1 {
              state {{ keepalived_state }}
              interface {{ keepalived_interface | default('eth0') }}
              virtual_router_id 51
              priority {{ keepalived_priority }}
              advert_int 1

              authentication {
                  auth_type PASS
                  auth_pass {{ lookup('env', 'KEEPALIVED_AUTH_PASS') }}
              }

              virtual_ipaddress {
                  {{ api_vip }}/{{ api_prefix }}
              }

              track_script {
                  chk_haproxy
              }
          }
      notify: Restart Keepalived

    - name: Enable and start HAProxy
      ansible.builtin.service:
        name: haproxy
        enabled: true
        state: started

    - name: Enable and start Keepalived
      ansible.builtin.service:
        name: keepalived
        enabled: true
        state: started

    - name: Apply pending load balancer service restarts
      ansible.builtin.meta: flush_handlers

    - name: Wait for HAProxy to listen on Kubernetes API port
      ansible.builtin.wait_for:
        host: "127.0.0.1"
        port: "{{ api_port }}"
        state: started
        timeout: 60

    - name: Wait for Keepalived master to own the API VIP
      ansible.builtin.command:
        argv:
          - ip
          - -o
          - addr
          - show
          - to
          - "{{ api_vip }}"
      register: keepalived_master_vip_check
      changed_when: false
      until: keepalived_master_vip_check.stdout | trim | length > 0
      retries: 12
      delay: 5
      when: inventory_hostname == keepalived_master

    - name: Check whether this load balancer owns the API VIP
      ansible.builtin.command:
        argv:
          - ip
          - -o
          - addr
          - show
          - to
          - "{{ api_vip }}"
      register: keepalived_vip_check
      changed_when: false
      failed_when: false

    - name: Wait until one load balancer owns the API VIP
      ansible.builtin.assert:
        that:
          - groups['loadbalancer'] | map('extract', hostvars, 'keepalived_vip_check') | select('defined') | map(attribute='stdout') | map('trim') | reject('equalto', '') | list | length == 1
        fail_msg: >-
          Keepalived did not assign API VIP {{ api_vip }} to exactly one load balancer.
          Check keepalived status, VRRP/firewall rules, interface selection and KEEPALIVED_AUTH_PASS.
        success_msg: "API VIP {{ api_vip }} is assigned to one load balancer."
      run_once: true

    - name: Wait for API VIP TCP port through HAProxy
      ansible.builtin.wait_for:
        host: "{{ api_vip }}"
        port: "{{ api_port }}"
        state: started
        timeout: 60
      run_once: true

  handlers:
    - name: Restart HAProxy
      ansible.builtin.service:
        name: haproxy
        state: restarted

    - name: Restart Keepalived
      ansible.builtin.service:
        name: keepalived
        state: restarted
