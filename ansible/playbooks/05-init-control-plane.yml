---
- name: Initialize first control plane
  hosts: control_plane[0]
  become: true
  tasks:
    - name: Check if cluster is already initialized
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: kubeadm_admin_conf

    - name: Read installed kubeadm version
      ansible.builtin.command: kubeadm version -o short
      register: kubeadm_version
      changed_when: false
      when: not kubeadm_admin_conf.stat.exists

    - name: Create kubeadm config
      ansible.builtin.copy:
        dest: /root/kubeadm-config.yaml
        content: |
          apiVersion: kubeadm.k8s.io/v1beta4
          kind: ClusterConfiguration
          kubernetesVersion: "{{ kubeadm_version.stdout }}"
          controlPlaneEndpoint: "{{ control_plane_endpoint }}"
          networking:
            podSubnet: "{{ pod_cidr }}"
            serviceSubnet: "{{ service_cidr }}"
          ---
          apiVersion: kubelet.config.k8s.io/v1beta1
          kind: KubeletConfiguration
          cgroupDriver: systemd
      when: not kubeadm_admin_conf.stat.exists

    - name: Initialize Kubernetes cluster
      ansible.builtin.command: kubeadm init --config /root/kubeadm-config.yaml --upload-certs
      register: kubeadm_init
      when: not kubeadm_admin_conf.stat.exists

    - name: Create kube config directory for ubuntu user
      ansible.builtin.file:
        path: "/home/{{ kube_user }}/.kube"
        state: directory
        owner: "{{ kube_user }}"
        group: "{{ kube_user }}"
        mode: "0755"

    - name: Copy admin.conf for ubuntu user
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: "/home/{{ kube_user }}/.kube/config"
        owner: "{{ kube_user }}"
        group: "{{ kube_user }}"
        mode: "0600"
        remote_src: true

    - name: Create local kubeadm kubeconfig for bootstrap actions
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/admin-local.conf
        mode: "0600"
        remote_src: true

    - name: Point local bootstrap kubeconfig at local API server
      ansible.builtin.replace:
        path: /root/admin-local.conf
        regexp: 'server: https://[^:]+:{{ api_port }}'
        replace: 'server: https://127.0.0.1:{{ api_port }}'

    - name: Wait for local Kubernetes API
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - /root/admin-local.conf
          - get
          - --raw=/readyz
      register: local_apiserver_ready
      changed_when: false
      until: local_apiserver_ready.rc == 0
      retries: 30
      delay: 5

    - name: Create join command
      ansible.builtin.command:
        argv:
          - kubeadm
          - token
          - create
          - --kubeconfig
          - /root/admin-local.conf
          - --print-join-command
      register: join_command_raw
      changed_when: false

    - name: Upload certs and get certificate key
      ansible.builtin.shell: kubeadm init phase upload-certs --upload-certs --kubeconfig /root/admin-local.conf | tail -n 1
      register: certificate_key_raw
      changed_when: false

    - name: Normalize join command endpoint to VIP
      ansible.builtin.set_fact:
        join_command: "{{ join_command_raw.stdout | regex_replace('^(kubeadm join )[^ ]+', '\\1' ~ control_plane_endpoint) }}"

    - name: Wait for Kubernetes API through VIP
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - /etc/kubernetes/admin.conf
          - get
          - --raw=/readyz
      register: vip_apiserver_ready
      changed_when: false
      until: vip_apiserver_ready.rc == 0
      retries: 30
      delay: 5

    - name: Set control plane join command fact
      ansible.builtin.set_fact:
        control_plane_join_command: "{{ join_command }} --control-plane --certificate-key {{ certificate_key_raw.stdout }}"

    - name: Set worker join command fact
      ansible.builtin.set_fact:
        worker_join_command: "{{ join_command }}"
