---
- name: Fetch kubeconfig
  hosts: control_plane[0]
  become: true
  any_errors_fatal: true
  tasks:
    - name: Fetch admin kubeconfig
      ansible.builtin.fetch:
        src: /etc/kubernetes/admin.conf
        dest: "{{ lookup('env', 'CLUSTER_KUBECONFIG_DEST') }}"
        flat: true

- name: Fix kubeconfig server endpoint locally
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  any_errors_fatal: true
  vars:
    ansible_become: false
  tasks:
    - name: Verify fetched kubeconfig exists
      ansible.builtin.stat:
        path: "{{ lookup('env', 'CLUSTER_KUBECONFIG_DEST') }}"
      register: fetched_kubeconfig

    - name: Stop if kubeconfig was not fetched
      ansible.builtin.fail:
        msg: "Kubeconfig was not fetched from the first control plane; earlier Kubernetes initialization steps did not complete."
      when: not fetched_kubeconfig.stat.exists

    - name: Replace server endpoint with VIP
      ansible.builtin.replace:
        path: "{{ lookup('env', 'CLUSTER_KUBECONFIG_DEST') }}"
        regexp: 'server: https://.*:[0-9]+'
        replace: 'server: https://{{ api_vip }}:{{ api_port }}'
