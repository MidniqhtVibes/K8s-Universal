schema_version: 1
id: 00000000-0000-0000-0000-000000000001
name: k8s-ha-lab

proxmox:
  endpoint: https://10.200.50.134:8006/
  node: pve
  datastore: local-lvm
  template_vm_id: 9000
  bridge: vmbr0
  vlan_id: null
  verify_tls: false
  credential_ref: credential://replace-in-web-ui

network:
  cidr: 10.200.50.0/24
  gateway: 10.200.50.1
  dns_servers: [10.200.50.1, 1.1.1.1]
  api_vip: 10.200.50.150

