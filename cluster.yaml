  - {name: lb-02, role: loadbalancer, vm_id: 302, ip: 10.200.50.146, cores: 1, memory_mb: 1024, disk_gb: 20}
  - {name: control-01, role: control_plane, vm_id: 311, ip: 10.200.50.151, cores: 2, memory_mb: 4096, disk_gb: 40}
  - {name: control-02, role: control_plane, vm_id: 312, ip: 10.200.50.152, cores: 2, memory_mb: 4096, disk_gb: 40}
  - {name: control-03, role: control_plane, vm_id: 313, ip: 10.200.50.153, cores: 2, memory_mb: 4096, disk_gb: 40}
  - {name: worker-01, role: worker, vm_id: 321, ip: 10.200.50.161, cores: 2, memory_mb: 4096, disk_gb: 50}
  - {name: worker-02, role: worker, vm_id: 322, ip: 10.200.50.162, cores: 2, memory_mb: 4096, disk_gb: 50}

addons:
