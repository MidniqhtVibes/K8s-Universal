name: ${COMPOSE_PROJECT_NAME:-k8s-universal}

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: clusterbuilder
      POSTGRES_USER: clusterbuilder
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clusterbuilder -d clusterbuilder"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  web:
    image: ${BUILDER_WEB_IMAGE:-ghcr.io/midniqhtvibes/k8s-universal-web}:${BUILDER_VERSION:-latest}
    env_file: ${BUILDER_ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql+psycopg://clusterbuilder:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres/clusterbuilder
      DATA_ROOT: /data
      SOURCE_ROOT: /workspace
    volumes:
      - cluster-data:/data
    ports:
      - "${BUILDER_BIND_ADDRESS:-127.0.0.1}:${BUILDER_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=3).read()"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  worker:
    image: ${BUILDER_WORKER_IMAGE:-ghcr.io/midniqhtvibes/k8s-universal-worker}:${BUILDER_VERSION:-latest}
    env_file: ${BUILDER_ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql+psycopg://clusterbuilder:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres/clusterbuilder
      DATA_ROOT: /data
      SOURCE_ROOT: /workspace
    volumes:
      - cluster-data:/data
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  cluster-data:
