services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: clusterbuilder
      POSTGRES_USER: clusterbuilder
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clusterbuilder -d clusterbuilder"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
    env_file: ${BUILDER_ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql+psycopg://clusterbuilder:${POSTGRES_PASSWORD}@postgres/clusterbuilder
      DATA_ROOT: /data
      SOURCE_ROOT: /iac
    volumes:
      - cluster-data:/data
      - ./:/iac:ro
    ports:
      - "${BUILDER_BIND_ADDRESS:-127.0.0.1}:${BUILDER_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=3).read()"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker
    env_file: ${BUILDER_ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql+psycopg://clusterbuilder:${POSTGRES_PASSWORD}@postgres/clusterbuilder
      DATA_ROOT: /data
      SOURCE_ROOT: /iac
    volumes:
      - cluster-data:/data
      - ./:/iac:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

  test:
    profiles: ["test"]
    build:
      context: .
      target: test
    command: ["pytest", "-q"]
    environment:
      DATABASE_URL: sqlite:////tmp/cluster-builder-tests.db
      MASTER_KEY: test-master-key-that-is-never-used-in-production
      SESSION_SECRET: test-session-secret-that-is-never-used-in-production
      INITIAL_ADMIN_PASSWORD: test-admin-password
      DATA_ROOT: /tmp/cluster-builder-data
      SOURCE_ROOT: /workspace

volumes:
  postgres-data:
  cluster-data:
