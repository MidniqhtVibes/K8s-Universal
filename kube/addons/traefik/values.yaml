deployment:
  replicas: 2

ingressClass:
  enabled: true
  isDefaultClass: true
  name: traefik

providers:
  kubernetesIngress:
    enabled: true

service:
  type: NodePort
  spec:
    externalTrafficPolicy: Cluster

ports:
  web:
    port: 80
    expose:
      default: true
    exposedPort: 80
    nodePort: 30080
    protocol: TCP

  websecure:
    port: 443
    expose:
      default: true
    exposedPort: 443
    nodePort: 30443
    protocol: TCP
